name: Update Eventbrite events

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-eventbrite-events
  cancel-in-progress: true

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the website
        uses: actions/checkout@v6

      - name: Refresh upcoming shows
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        run: python3 scripts/update-events.py

      - name: Validate generated website
        run: python3 scripts/validate-site.py

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- index.html shows events robots.txt sitemap.xml 404.html hire-comedians-london perform-with-us stay-in-touch let-us-talk-to-you.html scripts/site-state.json scripts/generated-files.json scripts/refresh-heartbeat.txt)" ]; then
            echo "Website is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- index.html shows events robots.txt sitemap.xml 404.html \
            hire-comedians-london perform-with-us stay-in-touch let-us-talk-to-you.html \
            scripts/site-state.json scripts/generated-files.json scripts/refresh-heartbeat.txt
          git commit -m "Update website from Eventbrite"
          git push
